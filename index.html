<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автоматический Видеомонтаж под Музыку</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .upload-section {
                grid-template-columns: 1fr;
            }
        }

        .upload-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .upload-box:hover {
            border-color: #00d9ff;
            background: rgba(255, 255, 255, 0.15);
        }

        .upload-box label {
            display: block;
            cursor: pointer;
            padding: 20px;
        }

        .upload-box input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .btn {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 20px auto;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .progress-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1a1a2e;
        }

        .logs {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            margin-top: 15px;
        }

        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #00d9ff;
            padding-left: 10px;
        }

        .log-entry.error {
            border-left-color: #ff4444;
            color: #ff8888;
        }

        .log-entry.success {
            border-left-color: #00ff88;
            color: #88ffbb;
        }

        .preview-section {
            margin-top: 30px;
            display: none;
        }

        .preview-section video {
            width: 100%;
            max-width: 800px;
            border-radius: 15px;
            display: block;
            margin: 0 auto;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00d9ff;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 5px;
        }

        .settings {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .settings label {
            display: block;
            margin: 10px 0;
        }

        .settings input[type="number"] {
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: 100px;
            margin-left: 10px;
        }

        .file-info {
            margin-top: 15px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Автоматический Видеомонтаж</h1>
        
        <div class="upload-section">
            <div class="upload-box">
                <label>
                    <div class="upload-icon">📁</div>
                    <div>Выберите папку с медиа</div>
                    <div style="font-size: 0.8em; opacity: 0.7;">(JPEG, PNG, MP4, MOV, WebM)</div>
                    <input type="file" id="mediaFolder" webkitdirectory multiple>
                </label>
                <div class="file-info" id="mediaInfo"></div>
            </div>
            
            <div class="upload-box">
                <label>
                    <div class="upload-icon">🎵</div>
                    <div>Выберите аудиофайл</div>
                    <div style="font-size: 0.8em; opacity: 0.7;">(MP3, WAV)</div>
                    <input type="file" id="audioFile" accept="audio/*">
                </label>
                <div class="file-info" id="audioInfo"></div>
            </div>
        </div>

        <div class="settings">
            <h3>⚙️ Настройки</h3>
            <label>
                Длительность клипа (в битах):
                <input type="number" id="beatsPerClip" value="4" min="1" max="16">
            </label>
            <label>
                Разрешение видео:
                <select id="resolution" style="padding: 10px; border-radius: 5px; border: none; margin-left: 10px;">
                    <option value="1920x1080">1920x1080 (Full HD)</option>
                    <option value="1280x720">1280x720 (HD)</option>
                    <option value="1080x1920">1080x1920 (Vertical)</option>
                </select>
            </label>
        </div>

        <button class="btn" id="createBtn" disabled>🎬 Создать видео</button>

        <div class="progress-section" id="progressSection">
            <h3>📊 Прогресс обработки</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            <div class="logs" id="logs"></div>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-value" id="bpmValue">-</div>
                <div class="stat-label">BPM</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="beatsValue">-</div>
                <div class="stat-label">Всего битов</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="clipsValue">-</div>
                <div class="stat-label">Клипов</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="durationValue">-</div>
                <div class="stat-label">Длительность (сек)</div>
            </div>
        </div>

        <div class="preview-section" id="previewSection">
            <h3 style="text-align: center; margin-bottom: 20px;">🎥 Предпросмотр</h3>
            <video id="previewVideo" controls></video>
            <button class="btn" id="downloadBtn" style="margin-top: 20px;">💾 Скачать видео</button>
        </div>
    </div>

    <script>
        const { FFmpeg } = FFmpegWASM;
        const { fetchFile } = FFmpegUtil;

        let ffmpeg = null;
        let audioContext = null;
        let audioBuffer = null;
        let mediaFiles = [];
        let audioFile = null;
        let beats = [];
        let bpm = 0;
        let finalVideoBlob = null;

        const mediaInput = document.getElementById('mediaFolder');
        const audioInput = document.getElementById('audioFile');
        const createBtn = document.getElementById('createBtn');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const logsDiv = document.getElementById('logs');
        const statsDiv = document.getElementById('stats');
        const previewSection = document.getElementById('previewSection');
        const previewVideo = document.getElementById('previewVideo');
        const downloadBtn = document.getElementById('downloadBtn');

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function updateProgress(percent, message = '') {
            progressFill.style.width = `${percent}%`;
            progressFill.textContent = `${Math.round(percent)}%`;
            if (message) log(message);
        }

        mediaInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            mediaFiles = files.filter(file => {
                const type = file.type;
                return type.startsWith('image/') || type.startsWith('video/');
            });

            const images = mediaFiles.filter(f => f.type.startsWith('image/')).length;
            const videos = mediaFiles.filter(f => f.type.startsWith('video/')).length;

            document.getElementById('mediaInfo').textContent = 
                `Найдено: ${images} фото, ${videos} видео (всего: ${mediaFiles.length})`;
            
            checkReady();
            log(`Загружено ${mediaFiles.length} медиафайлов`, 'success');
        });

        audioInput.addEventListener('change', async (e) => {
            audioFile = e.target.files[0];
            if (audioFile) {
                document.getElementById('audioInfo').textContent = 
                    `Файл: ${audioFile.name} (${(audioFile.size / 1024 / 1024).toFixed(2)} MB)`;
                
                try {
                    await loadAudio(audioFile);
                    checkReady();
                } catch (err) {
                    log(`Ошибка загрузки аудио: ${err.message}`, 'error');
                }
            }
        });

        async function loadAudio(file) {
            log('Загрузка и анализ аудио...');
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const arrayBuffer = await file.arrayBuffer();
            audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            log(`Аудио загружено: ${(audioBuffer.duration).toFixed(2)} сек`, 'success');
        }

        function checkReady() {
            createBtn.disabled = !(mediaFiles.length > 0 && audioBuffer);
        }

        function detectBeats() {
            log('Анализ битов...');
            
            const channelData = audioBuffer.getChannelData(0);
            const sampleRate = audioBuffer.sampleRate;
            const duration = audioBuffer.duration;
            
            const windowSize = Math.floor(sampleRate * 0.05);
            const threshold = 0.8;
            const minBeatInterval = sampleRate * 0.3;
            
            beats = [];
            let lastBeatTime = -minBeatInterval;
            
            for (let i = 0; i < channelData.length; i += windowSize) {
                let sum = 0;
                for (let j = 0; j < windowSize && i + j < channelData.length; j++) {
                    sum += Math.abs(channelData[i + j]);
                }
                const avg = sum / windowSize;
                
                if (avg > threshold && (i / sampleRate - lastBeatTime) > (minBeatInterval / sampleRate)) {
                    beats.push(i / sampleRate);
                    lastBeatTime = i / sampleRate;
                }
            }

            if (beats.length > 1) {
                const intervals = [];
                for (let i = 1; i < beats.length; i++) {
                    intervals.push(beats[i] - beats[i - 1]);
                }
                const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
                bpm = Math.round(60 / avgInterval);
            } else {
                bpm = 120;
            }

            log(`Найдено ${beats.length} битов, BPM: ${bpm}`, 'success');
            
            document.getElementById('bpmValue').textContent = bpm;
            document.getElementById('beatsValue').textContent = beats.length;
            
            return beats;
        }

        async function initFFmpeg() {
            if (!ffmpeg) {
                ffmpeg = new FFmpeg();
                ffmpeg.on('log', ({ message }) => {
                    console.log(message);
                });
                ffmpeg.on('progress', ({ progress }) => {
                    updateProgress(progress * 100);
                });
                
                log('Инициализация FFmpeg...');
                await ffmpeg.load({
                    coreURL: "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js",
                });
                log('FFmpeg готов', 'success');
            }
        }

        async function createVideo() {
            if (mediaFiles.length === 0 || !audioBuffer) {
                log('Ошибка: выберите медиафайлы и аудио', 'error');
                return;
            }

            progressSection.style.display = 'block';
            statsDiv.style.display = 'grid';
            logsDiv.innerHTML = '';
            
            try {
                await initFFmpeg();
                
                const beatsPerClip = parseInt(document.getElementById('beatsPerClip').value) || 4;
                const resolution = document.getElementById('resolution').value;
                const [width, height] = resolution.split('x').map(Number);
                
                detectBeats();
                
                const clipDuration = beatsPerClip * (60 / bpm);
                const totalClips = Math.ceil(beats.length / beatsPerClip);
                
                document.getElementById('clipsValue').textContent = totalClips;
                document.getElementById('durationValue').textContent = (totalClips * clipDuration).toFixed(2);
                
                log(`Создание ${totalClips} клипов по ${clipDuration.toFixed(2)} сек каждый`);
                
                await ffmpeg.writeFile('audio.mp3', await fetchFile(audioFile));
                
                const clipFiles = [];
                
                for (let i = 0; i < totalClips; i++) {
                    updateProgress((i / totalClips) * 50, `Обработка клипа ${i + 1}/${totalClips}`);
                    
                    const fileIndex = i % mediaFiles.length;
                    const file = mediaFiles[fileIndex];
                    const isImage = file.type.startsWith('image/');
                    
                    const clipName = `clip_${i}.${isImage ? 'jpg' : 'mp4'}`;
                    await ffmpeg.writeFile(clipName, await fetchFile(file));
                    
                    if (isImage) {
                        const effectType = Math.floor(Math.random() * 3);
                        let filter = 'scale=' + width + ':' + height + ':force_original_aspect_ratio=increase,crop=' + width + ':' + height;
                        
                        if (effectType === 0) {
                            filter += ',zoompan=z=\'min(zoom+0.0015,1.5)\':d=1:x=\'iw/2-(iw/zoom/2)\':y=\'ih/2-(ih/zoom/2)\':s=' + width + 'x' + height;
                        } else if (effectType === 1) {
                            const rotate = (Math.random() - 0.5) * 10;
                            filter += `,rotate=${rotate}*PI/180`;
                        } else {
                            filter += ',curves=vintage';
                        }
                        
                        await ffmpeg.exec([
                            '-loop', '1',
                            '-i', clipName,
                            '-t', clipDuration.toString(),
                            '-vf', filter,
                            '-c:v', 'libx264',
                            '-preset', 'ultrafast',
                            '-crf', '23',
                            '-pix_fmt', 'yuv420p',
                            `clip_${i}_processed.mp4`
                        ]);
                    } else {
                        const startTime = Math.random() * 0.5;
                        const filters = [
                            '',
                            'hue=s=1.5',
                            'hue=h=45',
                            'contrast=1.2',
                            'sepia=0.5',
                            'hue=s=0',
                            `setpts=${0.5 + Math.random()}*PTS`
                        ];
                        const filter = filters[Math.floor(Math.random() * filters.length)];
                        
                        await ffmpeg.exec([
                            '-ss', startTime.toString(),
                            '-i', clipName,
                            '-t', clipDuration.toString(),
                            '-vf', filter || `scale=${width}:${height}:force_original_aspect_ratio=increase,crop=${width}:${height}`,
                            '-c:v', 'libx264',
                            '-preset', 'ultrafast',
                            '-crf', '23',
                            '-pix_fmt', 'yuv420p',
                            `-c:a`, `aac`,
                            `clip_${i}_processed.mp4`
                        ]);
                    }
                    
                    clipFiles.push(`clip_${i}_processed.mp4`);
                }
                
                log('Сборка финального видео...', 'success');
                updateProgress(60, 'Сборка видео...');
                
                let concatList = '';
                clipFiles.forEach(file => {
                    concatList += `file '${file}'\n`;
                });
                
                await ffmpeg.writeFile('concat.txt', concatList);
                
                await ffmpeg.exec([
                    '-f', 'concat',
                    '-safe', '0',
                    '-i', 'concat.txt',
                    '-i', 'audio.mp3',
                    '-c:v', 'libx264',
                    '-preset', 'ultrafast',
                    '-crf', '23',
                    '-c:a', 'aac',
                    '-b:a', '192k',
                    '-shortest',
                    '-pix_fmt', 'yuv420p',
                    'output.mp4'
                ]);
                
                updateProgress(100, 'Готово!', 'success');
                log('Видео создано успешно!', 'success');
                
                const data = await ffmpeg.readFile('output.mp4');
                finalVideoBlob = new Blob([data.buffer], { type: 'video/mp4' });
                
                previewVideo.src = URL.createObjectURL(finalVideoBlob);
                previewSection.style.display = 'block';
                
                downloadBtn.onclick = () => {
                    const date = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                    saveAs(finalVideoBlob, `edited_video_${date}.mp4`);
                };
                
            } catch (error) {
                log(`Ошибка: ${error.message}`, 'error');
                console.error(error);
                updateProgress(0, 'Произошла ошибка');
            }
        }

        createBtn.addEventListener('click', createVideo);

        log('Приложение готово к работе');
    </script>
</body>
</html>
