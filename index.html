<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автоматический Видеомонтаж под Музыку</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(90deg, #00d9ff, #00ff88);
            --bg-dark: #0f0f1a;
            --bg-card: rgba(30, 30, 50, 0.8);
            --bg-hover: rgba(50, 50, 80, 0.6);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-cyan: #00d9ff;
            --accent-green: #00ff88;
            --error-red: #ff4444;
            --success-green: #00ff88;
            --border-radius: 16px;
            --shadow-glow: 0 0 30px rgba(102, 126, 234, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at top, #1a1a2e 0%, var(--bg-dark) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.8em;
            font-weight: 800;
            background: var(--secondary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 217, 255, 0.3);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        h2, h3 {
            font-weight: 600;
            margin-bottom: 15px;
        }

        .upload-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .upload-box {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 40px 30px;
            text-align: center;
            border: 2px dashed rgba(102, 126, 234, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .upload-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.1), transparent);
            transition: left 0.5s;
        }

        .upload-box:hover::before {
            left: 100%;
        }

        .upload-box:hover {
            border-color: var(--accent-cyan);
            background: var(--bg-hover);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.2);
        }

        .upload-box.has-files {
            border-style: solid;
            border-color: var(--accent-green);
            background: rgba(0, 255, 136, 0.05);
        }

        .upload-box label {
            display: block;
            cursor: pointer;
            padding: 10px;
        }

        .upload-box input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
            display: block;
            transition: transform 0.3s;
        }

        .upload-box:hover .upload-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .upload-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .upload-subtitle {
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .btn {
            background: var(--secondary-gradient);
            color: var(--bg-dark);
            border: none;
            padding: 18px 50px;
            font-size: 1.2em;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: block;
            margin: 30px auto;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 217, 255, 0.4);
        }

        .btn:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            filter: grayscale(1);
        }

        .progress-section {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 30px;
            margin-top: 30px;
            display: none;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 35px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            margin: 15px 0;
            position: relative;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
        }

        .progress-fill {
            height: 100%;
            background: var(--secondary-gradient);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--bg-dark);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.3),
                transparent
            );
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .logs {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px;
            max-height: 350px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.85em;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logs::-webkit-scrollbar {
            width: 8px;
        }

        .logs::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }

        .logs::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 4px;
        }

        .log-entry {
            margin: 8px 0;
            padding: 8px 12px;
            border-left: 4px solid var(--accent-cyan);
            padding-left: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 0 8px 8px 0;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-entry.error {
            border-left-color: var(--error-red);
            color: #ff8888;
            background: rgba(255, 68, 68, 0.05);
        }

        .log-entry.success {
            border-left-color: var(--success-green);
            color: #88ffbb;
            background: rgba(0, 255, 136, 0.05);
        }

        .log-entry.warning {
            border-left-color: #ffaa00;
            color: #ffcc66;
            background: rgba(255, 170, 0, 0.05);
        }

        .preview-section {
            margin-top: 40px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .preview-section video {
            width: 100%;
            max-width: 900px;
            border-radius: var(--border-radius);
            display: block;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 2px solid rgba(102, 126, 234, 0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            padding: 25px 20px;
            border-radius: var(--border-radius);
            text-align: center;
            border: 1px solid rgba(102, 126, 234, 0.2);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-cyan);
            box-shadow: var(--shadow-glow);
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 800;
            background: var(--secondary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .settings {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 25px;
            margin: 25px 0;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .settings h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .settings label {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .settings input[type="number"],
        .settings select {
            padding: 12px 16px;
            border-radius: 10px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            font-size: 1em;
            transition: all 0.3s;
            outline: none;
        }

        .settings input[type="number"]:focus,
        .settings select:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
        }

        .settings select option {
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        .file-info {
            margin-top: 15px;
            font-size: 0.9em;
            color: var(--accent-green);
            font-weight: 500;
            padding: 10px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 8px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: var(--accent-cyan);
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px 20px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        .alert-error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--error-red);
            color: #ff8888;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--success-green);
            color: #88ffbb;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .upload-section {
                grid-template-columns: 1fr;
            }

            .btn {
                width: 100%;
                padding: 15px 30px;
            }

            .settings-row {
                flex-direction: column;
                align-items: stretch;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 2em;
            }
        }

        /* Dark mode scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent-cyan), var(--accent-green));
            border-radius: 5px;
        }

        ::selection {
            background: rgba(102, 126, 234, 0.5);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Автоматический Видеомонтаж</h1>
        
        <div class="upload-section">
            <div class="upload-box">
                <label>
                    <div class="upload-icon">📁</div>
                    <div>Выберите папку с медиа</div>
                    <div style="font-size: 0.8em; opacity: 0.7;">(JPEG, PNG, MP4, MOV, WebM)</div>
                    <input type="file" id="mediaFolder" webkitdirectory multiple>
                </label>
                <div class="file-info" id="mediaInfo"></div>
            </div>
            
            <div class="upload-box">
                <label>
                    <div class="upload-icon">🎵</div>
                    <div>Выберите аудиофайл</div>
                    <div style="font-size: 0.8em; opacity: 0.7;">(MP3, WAV)</div>
                    <input type="file" id="audioFile" accept="audio/*">
                </label>
                <div class="file-info" id="audioInfo"></div>
            </div>
        </div>

        <div class="settings">
            <h3>⚙️ Настройки</h3>
            <div class="settings-row">
                <label>
                    Длительность клипа (в битах):
                    <input type="number" id="beatsPerClip" value="4" min="1" max="16">
                </label>
                <label>
                    Разрешение видео:
                    <select id="resolution">
                        <option value="1920x1080">1920x1080 (Full HD)</option>
                        <option value="1280x720">1280x720 (HD)</option>
                        <option value="1080x1920">1080x1920 (Vertical)</option>
                    </select>
                </label>
            </div>
        </div>

        <button class="btn" id="createBtn" disabled>🎬 Создать видео</button>

        <div class="progress-section" id="progressSection">
            <h3>📊 Прогресс обработки</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            <div class="logs" id="logs"></div>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-value" id="bpmValue">-</div>
                <div class="stat-label">BPM</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="beatsValue">-</div>
                <div class="stat-label">Всего битов</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="clipsValue">-</div>
                <div class="stat-label">Клипов</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="durationValue">-</div>
                <div class="stat-label">Длительность (сек)</div>
            </div>
        </div>

        <div class="preview-section" id="previewSection">
            <h3 style="text-align: center; margin-bottom: 20px;">🎥 Предпросмотр</h3>
            <video id="previewVideo" controls></video>
            <button class="btn" id="downloadBtn" style="margin-top: 20px;">💾 Скачать видео</button>
        </div>
    </div>

    <script>
        const { FFmpeg } = FFmpegWASM;
        const { fetchFile } = FFmpegUtil;

        let ffmpeg = null;
        let audioContext = null;
        let audioBuffer = null;
        let mediaFiles = [];
        let audioFile = null;
        let beats = [];
        let bpm = 0;
        let finalVideoBlob = null;

        const mediaInput = document.getElementById('mediaFolder');
        const audioInput = document.getElementById('audioFile');
        const createBtn = document.getElementById('createBtn');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const logsDiv = document.getElementById('logs');
        const statsDiv = document.getElementById('stats');
        const previewSection = document.getElementById('previewSection');
        const previewVideo = document.getElementById('previewVideo');
        const downloadBtn = document.getElementById('downloadBtn');

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function updateProgress(percent, message = '') {
            progressFill.style.width = `${percent}%`;
            progressFill.textContent = `${Math.round(percent)}%`;
            if (message) log(message);
        }

        mediaInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            mediaFiles = files.filter(file => {
                const type = file.type;
                return type.startsWith('image/') || type.startsWith('video/');
            });

            const images = mediaFiles.filter(f => f.type.startsWith('image/')).length;
            const videos = mediaFiles.filter(f => f.type.startsWith('video/')).length;

            const mediaInfoEl = document.getElementById('mediaInfo');
            const mediaBox = mediaInfoEl.closest('.upload-box');
            
            if (mediaFiles.length > 0) {
                mediaInfoEl.textContent = 
                    `Найдено: ${images} фото, ${videos} видео (всего: ${mediaFiles.length})`;
                mediaBox.classList.add('has-files');
            } else {
                mediaInfoEl.textContent = 'Нет подходящих файлов';
                mediaBox.classList.remove('has-files');
            }
            
            checkReady();
            log(`Загружено ${mediaFiles.length} медиафайлов`, 'success');
        });

        audioInput.addEventListener('change', async (e) => {
            audioFile = e.target.files[0];
            if (audioFile) {
                const audioInfoEl = document.getElementById('audioInfo');
                const audioBox = audioInfoEl.closest('.upload-box');
                
                audioInfoEl.textContent = 
                    `Файл: ${audioFile.name} (${(audioFile.size / 1024 / 1024).toFixed(2)} MB)`;
                audioBox.classList.add('has-files');
                
                try {
                    await loadAudio(audioFile);
                    checkReady();
                } catch (err) {
                    log(`Ошибка загрузки аудио: ${err.message}`, 'error');
                }
            }
        });

        async function loadAudio(file) {
            log('Загрузка и анализ аудио...');
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const arrayBuffer = await file.arrayBuffer();
            audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            log(`Аудио загружено: ${(audioBuffer.duration).toFixed(2)} сек`, 'success');
        }

        function checkReady() {
            createBtn.disabled = !(mediaFiles.length > 0 && audioBuffer);
        }

        function detectBeats() {
            log('Анализ битов...');
            
            const channelData = audioBuffer.getChannelData(0);
            const sampleRate = audioBuffer.sampleRate;
            const duration = audioBuffer.duration;
            
            const windowSize = Math.floor(sampleRate * 0.05);
            const threshold = 0.8;
            const minBeatInterval = sampleRate * 0.3;
            
            beats = [];
            let lastBeatTime = -minBeatInterval;
            
            for (let i = 0; i < channelData.length; i += windowSize) {
                let sum = 0;
                for (let j = 0; j < windowSize && i + j < channelData.length; j++) {
                    sum += Math.abs(channelData[i + j]);
                }
                const avg = sum / windowSize;
                
                if (avg > threshold && (i / sampleRate - lastBeatTime) > (minBeatInterval / sampleRate)) {
                    beats.push(i / sampleRate);
                    lastBeatTime = i / sampleRate;
                }
            }

            if (beats.length > 1) {
                const intervals = [];
                for (let i = 1; i < beats.length; i++) {
                    intervals.push(beats[i] - beats[i - 1]);
                }
                const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
                bpm = Math.round(60 / avgInterval);
            } else {
                bpm = 120;
            }

            log(`Найдено ${beats.length} битов, BPM: ${bpm}`, 'success');
            
            document.getElementById('bpmValue').textContent = bpm;
            document.getElementById('beatsValue').textContent = beats.length;
            
            return beats;
        }

        async function initFFmpeg() {
            if (!ffmpeg) {
                ffmpeg = new FFmpeg();
                ffmpeg.on('log', ({ message }) => {
                    console.log(message);
                });
                ffmpeg.on('progress', ({ progress }) => {
                    updateProgress(progress * 100);
                });
                
                log('Инициализация FFmpeg...');
                await ffmpeg.load({
                    coreURL: "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js",
                });
                log('FFmpeg готов', 'success');
            }
        }

        async function createVideo() {
            if (mediaFiles.length === 0 || !audioBuffer) {
                log('Ошибка: выберите медиафайлы и аудио', 'error');
                return;
            }

            progressSection.style.display = 'block';
            statsDiv.style.display = 'grid';
            logsDiv.innerHTML = '';
            
            try {
                await initFFmpeg();
                
                const beatsPerClip = parseInt(document.getElementById('beatsPerClip').value) || 4;
                const resolution = document.getElementById('resolution').value;
                const [width, height] = resolution.split('x').map(Number);
                
                detectBeats();
                
                const clipDuration = beatsPerClip * (60 / bpm);
                const totalClips = Math.ceil(beats.length / beatsPerClip);
                
                document.getElementById('clipsValue').textContent = totalClips;
                document.getElementById('durationValue').textContent = (totalClips * clipDuration).toFixed(2);
                
                log(`Создание ${totalClips} клипов по ${clipDuration.toFixed(2)} сек каждый`);
                
                await ffmpeg.writeFile('audio.mp3', await fetchFile(audioFile));
                
                const clipFiles = [];
                
                for (let i = 0; i < totalClips; i++) {
                    updateProgress((i / totalClips) * 50, `Обработка клипа ${i + 1}/${totalClips}`);
                    
                    const fileIndex = i % mediaFiles.length;
                    const file = mediaFiles[fileIndex];
                    const isImage = file.type.startsWith('image/');
                    
                    const clipName = `clip_${i}.${isImage ? 'jpg' : 'mp4'}`;
                    await ffmpeg.writeFile(clipName, await fetchFile(file));
                    
                    if (isImage) {
                        const effectType = Math.floor(Math.random() * 3);
                        let filter = 'scale=' + width + ':' + height + ':force_original_aspect_ratio=increase,crop=' + width + ':' + height;
                        
                        if (effectType === 0) {
                            filter += ',zoompan=z=\'min(zoom+0.0015,1.5)\':d=1:x=\'iw/2-(iw/zoom/2)\':y=\'ih/2-(ih/zoom/2)\':s=' + width + 'x' + height;
                        } else if (effectType === 1) {
                            const rotate = (Math.random() - 0.5) * 10;
                            filter += `,rotate=${rotate}*PI/180`;
                        } else {
                            filter += ',curves=vintage';
                        }
                        
                        await ffmpeg.exec([
                            '-loop', '1',
                            '-i', clipName,
                            '-t', clipDuration.toString(),
                            '-vf', filter,
                            '-c:v', 'libx264',
                            '-preset', 'ultrafast',
                            '-crf', '23',
                            '-pix_fmt', 'yuv420p',
                            `clip_${i}_processed.mp4`
                        ]);
                    } else {
                        const startTime = Math.random() * 0.5;
                        const filters = [
                            '',
                            'hue=s=1.5',
                            'hue=h=45',
                            'contrast=1.2',
                            'sepia=0.5',
                            'hue=s=0',
                            `setpts=${0.5 + Math.random()}*PTS`
                        ];
                        const filter = filters[Math.floor(Math.random() * filters.length)];
                        
                        await ffmpeg.exec([
                            '-ss', startTime.toString(),
                            '-i', clipName,
                            '-t', clipDuration.toString(),
                            '-vf', filter || `scale=${width}:${height}:force_original_aspect_ratio=increase,crop=${width}:${height}`,
                            '-c:v', 'libx264',
                            '-preset', 'ultrafast',
                            '-crf', '23',
                            '-pix_fmt', 'yuv420p',
                            `-c:a`, `aac`,
                            `clip_${i}_processed.mp4`
                        ]);
                    }
                    
                    clipFiles.push(`clip_${i}_processed.mp4`);
                }
                
                log('Сборка финального видео...', 'success');
                updateProgress(60, 'Сборка видео...');
                
                let concatList = '';
                clipFiles.forEach(file => {
                    concatList += `file '${file}'\n`;
                });
                
                await ffmpeg.writeFile('concat.txt', concatList);
                
                await ffmpeg.exec([
                    '-f', 'concat',
                    '-safe', '0',
                    '-i', 'concat.txt',
                    '-i', 'audio.mp3',
                    '-c:v', 'libx264',
                    '-preset', 'ultrafast',
                    '-crf', '23',
                    '-c:a', 'aac',
                    '-b:a', '192k',
                    '-shortest',
                    '-pix_fmt', 'yuv420p',
                    'output.mp4'
                ]);
                
                updateProgress(100, 'Готово!', 'success');
                log('Видео создано успешно!', 'success');
                
                const data = await ffmpeg.readFile('output.mp4');
                finalVideoBlob = new Blob([data.buffer], { type: 'video/mp4' });
                
                previewVideo.src = URL.createObjectURL(finalVideoBlob);
                previewSection.style.display = 'block';
                
                downloadBtn.onclick = () => {
                    const date = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                    saveAs(finalVideoBlob, `edited_video_${date}.mp4`);
                };
                
            } catch (error) {
                log(`Ошибка: ${error.message}`, 'error');
                console.error(error);
                updateProgress(0, 'Произошла ошибка');
            }
        }

        createBtn.addEventListener('click', createVideo);

        log('Приложение готово к работе');
    </script>
</body>
</html>
