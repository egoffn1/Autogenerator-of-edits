<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoEdit Generator - Fast & Local</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #6366f1;
            --accent: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --border-radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        @media (max-width: 600px) { .controls-grid { grid-template-columns: 1fr; } }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; }
        input[type="file"] {
            background: rgba(0,0,0,0.2);
            border: 2px dashed var(--text-muted);
            border-radius: var(--border-radius);
            padding: 15px;
            color: var(--text-main);
            cursor: pointer;
        }
        input[type="file"].active { border-color: var(--primary); background: rgba(99,102,241,0.1); }
        .settings-row {
            grid-column: 1 / -1;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: var(--border-radius);
        }
        select, input[type="number"] {
            background: var(--bg-color);
            border: 1px solid var(--text-muted);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
        }
        button {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: var(--border-radius);
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99,102,241,0.4); }
        button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        #downloadBtn { background: linear-gradient(135deg, var(--success), #059669); display: none; }
        .preview-container {
            margin-top: 25px;
            background: #000;
            border-radius: var(--border-radius);
            overflow: hidden;
            aspect-ratio: 16/9;
            display: none;
        }
        video, canvas { width: 100%; height: 100%; }
        canvas { display: none; }
        .logs-panel {
            margin-top: 25px;
            background: #000;
            border: 1px solid #333;
            border-radius: var(--border-radius);
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            color: #ccc;
        }
        .log-entry { margin-bottom: 5px; }
        .log-info { color: var(--accent); }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); }
        .progress-container {
            margin-top: 15px;
            background: #333;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.3s;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            background: #333;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎵 AutoEdit Generator</h1>
    <div class="controls-grid">
        <div class="input-group">
            <label>1. Папка с фото/видео</label>
            <input type="file" id="mediaInput" webkitdirectory multiple accept="image/*,video/*">
            <span id="mediaCount" class="status-badge">0 файлов</span>
        </div>
        <div class="input-group">
            <label>2. Музыка</label>
            <input type="file" id="audioInput" accept="audio/*">
            <span id="audioName" class="status-badge">Нет файла</span>
        </div>
        <div class="settings-row">
            <select id="resolution">
                <option value="1280x720">720p (Fast)</option>
                <option value="1920x1080">1080p</option>
                <option value="1080x1920">Vertical</option>
            </select>
            <input type="number" id="beatDuration" value="4" min="1" max="16" style="width:80px;">
            <select id="effectsMode">
                <option value="normal">Normal</option>
                <option value="hard">Hard</option>
                <option value="chill">Chill</option>
            </select>
        </div>
    </div>
    <button id="generateBtn">🚀 Создать видео</button>
    <button id="downloadBtn">💾 Скачать</button>
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    <div class="preview-container">
        <canvas id="renderCanvas"></canvas>
        <video id="previewPlayer" controls style="display:none;"></video>
    </div>
    <div class="logs-panel" id="logsPanel"></div>
</div>

<script>
const state = { mediaFiles: [], audioFile: null, audioBuffer: null, beats: [], isProcessing: false, recordedChunks: [] };
const els = {
    mediaInput: document.getElementById('mediaInput'),
    audioInput: document.getElementById('audioInput'),
    mediaCount: document.getElementById('mediaCount'),
    audioName: document.getElementById('audioName'),
    generateBtn: document.getElementById('generateBtn'),
    downloadBtn: document.getElementById('downloadBtn'),
    canvas: document.getElementById('renderCanvas'),
    videoPlayer: document.getElementById('previewPlayer'),
    logs: document.getElementById('logsPanel'),
    progressBar: document.getElementById('progressBar'),
    progressContainer: document.querySelector('.progress-container'),
    previewContainer: document.querySelector('.preview-container'),
    resolution: document.getElementById('resolution'),
    beatDuration: document.getElementById('beatDuration'),
    effectsMode: document.getElementById('effectsMode')
};
const ctx = els.canvas.getContext('2d');

function log(msg, type='info') {
    const div = document.createElement('div');
    div.className = `log-entry log-${type}`;
    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    els.logs.appendChild(div);
    els.logs.scrollTop = els.logs.scrollHeight;
}

els.mediaInput.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/') || f.type.startsWith('video/'));
    if (!files.length) { log('Папка пуста!', 'error'); return; }
    state.mediaFiles = [];
    els.mediaCount.textContent = `${files.length} файлов`;
    els.mediaInput.classList.add('active');
    log(`Загрузка ${files.length} файлов...`);
    for (const file of files) {
        const url = URL.createObjectURL(file);
        const item = { url, type: file.type.split('/')[0] };
        if (item.type === 'image') {
            const img = new Image();
            img.src = url;
            await new Promise(r => img.onload = r);
            item.element = img;
        } else {
            const vid = document.createElement('video');
            vid.src = url;
            vid.muted = true;
            await new Promise(r => vid.onloadeddata = r);
            item.element = vid;
        }
        state.mediaFiles.push(item);
    }
    log('Медиа готовы', 'success');
});

els.audioInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    state.audioFile = file;
    els.audioName.textContent = file.name;
    els.audioInput.classList.add('active');
    try {
        const ab = await file.arrayBuffer();
        const actx = new (AudioContext||webkitAudioContext)();
        state.audioBuffer = await actx.decodeAudioData(ab);
        analyzeBeats();
        log(`Аудио готово: ${state.audioBuffer.duration.toFixed(1)}с`, 'success');
    } catch(err) { log(`Ошибка: ${err.message}`, 'error'); }
});

function analyzeBeats() {
    const data = state.audioBuffer.getChannelData(0);
    const sr = state.audioBuffer.sampleRate;
    const step = Math.floor(sr/10);
    state.beats = [];
    let last = 0;
    for (let i=0; i<data.length; i+=step) {
        let sum=0;
        for (let j=0; j<step && i+j<data.length; j++) sum += Math.abs(data[i+j]);
        const energy = sum/step;
        if (energy > 0.8 && (i/sr)-last > 0.3) {
            state.beats.push(i/sr);
            last = i/sr;
        }
    }
    if (state.beats.length < 10) {
        state.beats = [];
        for(let t=0; t<state.audioBuffer.duration; t+=0.5) state.beats.push(t);
    }
    log(`Битов: ${state.beats.length}`);
}

els.generateBtn.addEventListener('click', async () => {
    if (!state.mediaFiles.length) return log('Нет медиа!', 'error');
    if (!state.audioBuffer) return log('Нет аудио!', 'error');
    if (state.isProcessing) return;
    
    state.isProcessing = true;
    state.recordedChunks = [];
    els.generateBtn.disabled = true;
    els.downloadBtn.style.display = 'none';
    els.previewContainer.style.display = 'block';
    els.videoPlayer.style.display = 'none';
    els.canvas.style.display = 'block';
    els.progressContainer.style.display = 'block';
    
    const [w,h] = els.resolution.value.split('x').map(Number);
    els.canvas.width = w;
    els.canvas.height = h;
    const duration = state.audioBuffer.duration;
    const bpc = parseInt(els.beatDuration.value);
    const mode = els.effectsMode.value;
    
    log('Рендеринг...');
    
    const audioEl = document.createElement('audio');
    audioEl.src = URL.createObjectURL(state.audioFile);
    
    const actx = new AudioContext();
    const src = actx.createMediaElementSource(audioEl);
    const dest = actx.createMediaStreamDestination();
    src.connect(dest);
    src.connect(actx.destination);
    
    const cstream = els.canvas.captureStream(30);
    const final = new MediaStream([...cstream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
    const rec = new MediaRecorder(final, { mimeType: 'video/webm;codecs=vp9' });
    
    rec.ondataavailable = e => { if(e.data.size) state.recordedChunks.push(e.data); };
    rec.onstop = () => {
        const blob = new Blob(state.recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        els.videoPlayer.src = url;
        els.videoPlayer.style.display = 'block';
        els.canvas.style.display = 'none';
        els.downloadBtn.style.display = 'block';
        els.downloadBtn.onclick = () => saveAs(blob, `edit_${Date.now()}.webm`);
        state.isProcessing = false;
        els.generateBtn.disabled = false;
        els.progressBar.style.width = '100%';
        log('Готово! Нажмите Скачать', 'success');
    };
    
    let start = null, idx = 0, lastGrp = -1;
    
    function draw(ts) {
        if (!start) start = ts;
        const elapsed = (ts-start)/1000;
        els.progressBar.style.width = `${Math.min((elapsed/duration)*100,100)}%`;
        
        if (elapsed >= duration) {
            rec.stop();
            audioEl.pause();
            actx.close();
            return;
        }
        
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,w,h);
        
        let bIdx = 0;
        for (let i=0; i<state.beats.length; i++) {
            if (state.beats[i] <= elapsed) bIdx = i;
            else break;
        }
        const grp = Math.floor(bIdx/bpc);
        if (grp !== lastGrp) {
            lastGrp = grp;
            idx = (idx+1) % state.mediaFiles.length;
        }
        
        const m = state.mediaFiles[idx];
        ctx.save();
        const scale = Math.max(w/m.element.width, h/m.element.height);
        const zoom = 1 + Math.sin(elapsed*0.5)*0.1;
        ctx.translate(w/2,h/2);
        ctx.scale(scale*zoom, scale*zoom);
        ctx.translate(-w/2,-h/2);
        
        if (mode==='hard') ctx.filter = `hue-rotate(${Math.sin(elapsed*2)*90}deg)`;
        else if (mode==='chill') ctx.filter = 'sepia(0.3)';
        
        ctx.drawImage(m.element, 0, 0, m.element.width, m.element.height);
        ctx.restore();
        
        if (state.beats.some((b,i)=>Math.abs(elapsed-b)<0.08 && i%bpc===0) && mode==='hard') {
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fillRect(0,0,w,h);
        }
        
        requestAnimationFrame(draw);
    }
    
    await audioEl.play();
    rec.start();
    requestAnimationFrame(draw);
});

log('Приложение готово');
</script>
</body>
</html>
